# Workflow de test pour PortalBot - s'exécute sur push et pull_request
name: Test PortalBot

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Permet l'exécution manuelle

jobs:
  test:
    name: Tests et validation du code
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Respecte les limites GitHub Actions (6h max, mais on garde ça court)

    steps:
    - name: Checkout du code
      uses: actions/checkout@v4

    - name: Configuration Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip' # Cache les dépendances pour accélérer les prochains runs

    - name: Installation des dépendances système
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends tesseract-ocr
        sudo rm -rf /var/lib/apt/lists/*

    - name: Installation des dépendances Python
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install --with-deps chromium

    - name: Vérification de la syntaxe (Black et Ruff)
      run: |
        # Vérifie si le code est formaté avec Black
        black --check . || echo "⚠️ Le code n'est pas formaté avec Black"
        # Vérifie les erreurs de linting avec Ruff
        ruff check .

    - name: Test de la base de données (mode local)
      env:
        HEADLESS: "true"
      run: |
        # Crée un fichier .env minimal pour les tests
        echo "HEADLESS=true" > .env
        # Exécute le script de test de la DB
        python test_db.py

    - name: Upload des logs (si besoin)
      uses: actions/upload-artifact@v4
      if: failure() # Seulement si le job échoue
      with:
        name: test-logs
        path: "*.log"
        retention-days: 7
